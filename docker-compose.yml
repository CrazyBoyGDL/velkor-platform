version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: velkor-postgres
    environment:
      POSTGRES_DB: ${DATABASE_NAME:-velkor_platform}
      POSTGRES_USER: ${DATABASE_USERNAME:-velkor}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD:-velkor_secure_password}
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME:-velkor}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velkor-network

  # Strapi CMS with pre-built image approach
  strapi:
    image: node:24-alpine
    container_name: velkor-strapi
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    environment:
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${DATABASE_NAME:-velkor_platform}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-velkor}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-velkor_secure_password}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key}
      STRAPI_ADMIN_PATH: /admin
      API_URL: http://localhost:1337
      NODE_ENV: development
    ports:
      - "1337:1337"
    volumes:
      - ./apps/api:/app
      - /app/node_modules
    command: sh -c "npm install && npm run develop"
    networks:
      - velkor-network

  # Next.js Frontend with pre-built approach
  nextjs:
    image: node:24-alpine
    container_name: velkor-nextjs
    depends_on:
      - strapi
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:1337
      NODE_ENV: development
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
    command: sh -c "npm install && npm run dev"
    networks:
      - velkor-network

volumes:
  postgres_data:
    driver: local

networks:
  velkor-network:
    driver: bridge
