<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Dark version: amber on near-black -->
  <rect width="48" height="48" rx="10" fill="#0a0a0a"/>

  <!-- Node glow rings -->
  <circle cx="6"  cy="6"  r="5" fill="#f59e0b" opacity="0.14"/>
  <circle cx="42" cy="6"  r="5" fill="#f59e0b" opacity="0.14"/>
  <circle cx="15" cy="24" r="4" fill="#f59e0b" opacity="0.10"/>
  <circle cx="33" cy="24" r="4" fill="#f59e0b" opacity="0.10"/>
  <circle cx="24" cy="15" r="4" fill="#f59e0b" opacity="0.10"/>
  <circle cx="24" cy="42" r="5" fill="#f59e0b" opacity="0.14"/>

  <!-- V-shape main edges -->
  <line x1="6"  y1="6"  x2="15" y2="24" stroke="#f59e0b" stroke-width="2"   stroke-linecap="round"/>
  <line x1="15" y1="24" x2="24" y2="42" stroke="#f59e0b" stroke-width="2"   stroke-linecap="round"/>
  <line x1="42" y1="6"  x2="33" y2="24" stroke="#f59e0b" stroke-width="2"   stroke-linecap="round"/>
  <line x1="33" y1="24" x2="24" y2="42" stroke="#f59e0b" stroke-width="2"   stroke-linecap="round"/>

  <!-- Network cross edges -->
  <line x1="6"  y1="6"  x2="24" y2="15" stroke="#f59e0b" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="24" y1="15" x2="42" y2="6"  stroke="#f59e0b" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <line x1="15" y1="24" x2="33" y2="24" stroke="#f59e0b" stroke-width="1.2" stroke-linecap="round" opacity="0.45"/>
  <line x1="24" y1="15" x2="15" y2="24" stroke="#f59e0b" stroke-width="1"   stroke-linecap="round" opacity="0.35"/>
  <line x1="24" y1="15" x2="33" y2="24" stroke="#f59e0b" stroke-width="1"   stroke-linecap="round" opacity="0.35"/>

  <!-- Node cores -->
  <circle cx="6"  cy="6"  r="2.5" fill="#f59e0b"/>
  <circle cx="42" cy="6"  r="2.5" fill="#f59e0b"/>
  <circle cx="15" cy="24" r="2"   fill="#fbbf24"/>
  <circle cx="33" cy="24" r="2"   fill="#fbbf24"/>
  <circle cx="24" cy="15" r="2"   fill="#fbbf24"/>
  <circle cx="24" cy="42" r="2.5" fill="#f59e0b"/>
</svg>
